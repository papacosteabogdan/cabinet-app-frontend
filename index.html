<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cabinet.app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2B4B;
      --navy-l: #243558;
      --navy-d: #111e33;
      --gold: #C9A84C;
      --gold-l: #E2C47A;
      --cream: #F5F0E8;
      --cream-d: #EDE6D6;
      --white: #FFFFFF;
      --text: #2C2C2C;
      --muted: #6B7280;
      --border: #DDD5C4;
      --success: #2D6A4F;
      --success-bg: #E8F5EE;
      --danger: #9B2335;
    }

    html, body, #root { height: 100%; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--cream); color: var(--text); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--navy);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(201,168,76,0.15);
    }
    .sidebar-logo { padding: 24px 20px 18px; border-bottom: 1px solid rgba(201,168,76,0.12); }
    .logo-mark { display: flex; align-items: center; gap: 10px; }
    .logo-gem {
      width: 32px; height: 32px; background: var(--gold);
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-text { color: var(--gold); font-size: 18px; font-weight: 700; letter-spacing: 0.08em; }
    .logo-sub { font-family: 'DM Sans', sans-serif; font-size: 9px; color: rgba(245,240,232,0.4); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 2px; }

    nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-section { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,232,0.25); padding: 14px 20px 5px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: rgba(245,240,232,0.6);
      border-left: 2px solid transparent;
      transition: all 0.15s; user-select: none;
    }
    .nav-item:hover { color: rgba(245,240,232,0.9); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--gold); background: rgba(201,168,76,0.08); border-left-color: var(--gold); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-user { padding: 14px 20px; border-top: 1px solid rgba(201,168,76,0.1); }
    .user-name { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--cream); }
    .user-role { font-family: 'DM Sans', sans-serif; font-size: 10px; color: rgba(245,240,232,0.4); margin-top: 2px; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .page-title { font-size: 22px; font-weight: 600; color: var(--navy); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .pill {
      font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em;
      background: var(--navy); color: var(--gold);
    }

    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* Cards */
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 22px;
    }
    .card-title {
      font-size: 16px; font-weight: 600; color: var(--navy);
      margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

    /* Stat cards */
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
    .stat-num { font-size: 34px; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-label { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); margin-top: 5px; letter-spacing: 0.05em; }
    .stat-accent { height: 3px; border-radius: 2px; margin-bottom: 14px; }

    /* Buttons */
    .btn {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 8px 16px; border-radius: 5px; border: none; cursor: pointer;
      letter-spacing: 0.04em; transition: opacity 0.15s; display: inline-flex;
      align-items: center; gap: 6px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--navy); color: var(--cream); }
    .btn-gold { background: var(--gold); color: var(--navy); }
    .btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--navy); }
    .btn-sm { padding: 5px 11px; font-size: 11px; }
    .btn-lg { padding: 12px 24px; font-size: 14px; width: 100%; justify-content: center; }

    /* Tags */
    .tag {
      font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 3px; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .tag-green { background: var(--success-bg); color: var(--success); }
    .tag-gold { background: #FDF3DC; color: #8B6914; }
    .tag-blue { background: #EDF2FB; color: #3B5FA0; }
    .tag-gray { background: var(--cream-d); color: var(--muted); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .form-input {
      width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px;
      background: var(--white); color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--navy); }

    /* Divider */
    .divider { height: 1px; background: var(--cream-d); margin: 14px 0; }

    /* Row */
    .row { display: flex; align-items: center; gap: 10px; }
    .row-between { display: flex; align-items: center; justify-content: space-between; }

    /* Avatar */
    .avatar {
      border-radius: 50%; background: var(--navy-l); color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-weight: 600; flex-shrink: 0;
    }

    /* List rows */
    .list-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--cream-d); gap: 12px; }
    .list-row:last-child { border-bottom: none; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; color: var(--navy); text-align: left; padding: 9px 12px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 2px solid var(--navy); }
    td { padding: 12px 12px; border-bottom: 1px solid var(--cream-d); font-family: 'DM Sans', sans-serif; font-size: 13px; }
    tr:last-child td { border-bottom: none; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: 60px repeat(5, 1fr); }
    .cal-header { background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--navy); padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; }
    .cal-time { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); padding: 8px; text-align: right; border-bottom: 1px solid var(--cream-d); }
    .cal-cell { border-left: 1px solid var(--cream-d); border-bottom: 1px solid var(--cream-d); padding: 3px; min-height: 48px; }
    .cal-apt {
      border-radius: 4px; padding: 4px 7px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
      height: 100%; border-left: 3px solid;
    }
    .cal-apt-individual { background: #E8F5EE; border-color: var(--success); color: #1a4731; }
    .cal-apt-cuplu { background: #EDF2FB; border-color: #3B5FA0; color: #1e3a6e; }
    .cal-apt-minor { background: #FDF3DC; border-color: var(--gold); color: #6b4e0a; }

    /* Login */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--navy);
      background-image: radial-gradient(circle at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 40%);
    }
    .login-card {
      background: var(--white); border-radius: 12px; padding: 40px;
      width: 380px; box-shadow: 0 40px 80px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-gem {
      width: 48px; height: 48px; background: var(--gold);
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
      margin: 0 auto 12px;
    }
    .login-title { font-size: 28px; font-weight: 700; color: var(--navy); }
    .login-sub { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
    .login-error { background: #FEE2E2; border: 1px solid #FCA5A5; border-radius: 6px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--danger); margin-bottom: 14px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(27,43,75,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--white); border-radius: 10px; padding: 28px; width: 460px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .modal-title { font-size: 20px; font-weight: 600; color: var(--navy); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { cursor: pointer; font-size: 20px; color: var(--muted); background: none; border: none; }

    /* Info box */
    .info-box { background: var(--cream); border-left: 3px solid var(--gold); padding: 12px 16px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); }

    /* Alert */
    .alert-success { background: var(--success-bg); border: 1px solid #A8D5BC; border-radius: 6px; padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--success); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { createClient } = supabase;

// ── Config ─────────────────────────────────────────────────
const SUPABASE_URL = "https://pwboukwsuguzezxgiibq.supabase.co";
const SUPABASE_KEY = "sb_publishable_CRg7_i42oTJ1nXYgW_mgDA_0X05j1LU";
const API = "https://cabinet-app-api-production.up.railway.app";

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Helpers ────────────────────────────────────────────────
const apiFetch = async (path, opts = {}, token) => {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}`, ...opts.headers },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Eroare server");
  return data;
};

const DAYS = ["Lu", "Ma", "Mi", "Jo", "Vi"];
const HOURS = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"];

// ── Avatar ─────────────────────────────────────────────────
const Avatar = ({ name = "?", size = 36 }) => (
  <div className="avatar" style={{ width: size, height: size, fontSize: size * 0.36 }}>
    {name.charAt(0).toUpperCase()}
  </div>
);

// ── Tag ────────────────────────────────────────────────────
const Tag = ({ type }) => {
  const map = { adult: ["tag-green","Adult"], minor: ["tag-gold","Minor"], cuplu: ["tag-blue","Cuplu"],
    activ: ["tag-green","Activ"], inactiv: ["tag-gray","Inactiv"],
    programata: ["tag-blue","Programată"], confirmata: ["tag-green","Confirmată"],
    realizata: ["tag-gray","Realizată"], anulata: ["tag-gray","Anulată"] };
  const [cls, label] = map[type] || ["tag-gray", type];
  return <span className={`tag ${cls}`}>{label}</span>;
};

// ── Login ──────────────────────────────────────────────────
const Login = ({ onLogin }) => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleLogin = async () => {
    setLoading(true); setError(null);
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      onLogin(data.session);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-gem" />
          <div className="login-title">cabinet.app</div>
          <div className="login-sub">Psihologie clinică</div>
        </div>
        {error && <div className="login-error">{error}</div>}
        <div className="form-group">
          <label className="form-label">Email</label>
          <input className="form-input" type="email" value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="email@exemplu.ro" />
        </div>
        <div className="form-group">
          <label className="form-label">Parolă</label>
          <input className="form-input" type="password" value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="••••••••" />
        </div>
        <button className="btn btn-primary btn-lg" style={{ marginTop: 8 }}
          onClick={handleLogin} disabled={loading}>
          {loading ? "Se autentifică..." : "Intră în cont"}
        </button>
      </div>
    </div>
  );
};

// ── Dashboard ──────────────────────────────────────────────
const Dashboard = ({ token, cabinetInfo }) => {
  const [stats, setStats] = useState({ active_patients: 0, sessions_this_week: 0 });
  const [sessions, setSessions] = useState([]);

  useEffect(() => {
    apiFetch("/api/cabinet/stats", {}, token).then(setStats).catch(console.error);
    const now = new Date();
    const from = new Date(now); from.setHours(0,0,0,0);
    const to = new Date(now); to.setDate(to.getDate() + 1); to.setHours(23,59,59,999);
    apiFetch(`/api/sessions?from=${from.toISOString()}&to=${to.toISOString()}&limit=10`, {}, token)
      .then(setSessions).catch(console.error);
  }, [token]);

  const typeColor = { individual: "#E8F5EE", cuplu: "#EDF2FB", minor: "#FDF3DC" };

  return (
    <div>
      <div className="grid-3" style={{ marginBottom: 20 }}>
        {[
          { num: stats.active_patients, label: "Clienți activi", color: "#C9A84C" },
          { num: stats.sessions_this_week, label: "Ședințe săptămâna asta", color: "#1B2B4B" },
          { num: 0, label: "Documente în așteptare", color: "#2D6A4F" },
        ].map((s, i) => (
          <div className="stat-card" key={i}>
            <div className="stat-accent" style={{ background: s.color }} />
            <div className="stat-num">{s.num}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">Azi</div>
          {sessions.length === 0
            ? <div className="info-box">Nu sunt programări pentru azi.</div>
            : sessions.map((s, i) => (
              <div className="list-row" key={i}>
                <Avatar name={s.patient?.last_name || "?"} size={34} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 500 }}>
                    {s.patient?.last_name} {s.patient?.first_name}
                  </div>
                  <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "var(--muted)" }}>
                    {new Date(s.starts_at).toLocaleTimeString("ro", { hour: "2-digit", minute: "2-digit" })} · {s.duration_min} min
                  </div>
                </div>
                <Tag type={s.session_type || "individual"} />
              </div>
            ))
          }
        </div>

        <div className="card">
          <div className="card-title">Cabinet</div>
          {cabinetInfo && (
            <div>
              {[
                ["Psiholog", cabinetInfo.profile?.full_name],
                ["Cod CPR", cabinetInfo.profile?.cod_cpr],
                ["Cabinet", cabinetInfo.name],
                ["Email", cabinetInfo.email],
                ["Telefon", cabinetInfo.phone],
              ].map(([k, v]) => v && (
                <div className="list-row" key={k}>
                  <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "var(--muted)", width: 80, flexShrink: 0 }}>{k}</div>
                  <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13 }}>{v}</div>
                </div>
              ))}
              <div style={{ marginTop: 16 }}>
                <div className="info-box">
                  Plan: <strong>Trial</strong> — 30 zile gratuit
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Modal Editare Ședință ──────────────────────────────────
const EditSessionModal = ({ token, session, onClose, onSaved }) => {
  const d = new Date(session.starts_at);
  const localDate = d.toLocaleDateString("sv"); // YYYY-MM-DD
  const localHour = String(d.getHours()).padStart(2,"0") + ":00";

  const [form, setForm] = useState({
    date: localDate,
    hour: localHour,
    session_type: session.session_type || "individual",
    modality: session.modality || "in_person",
    notes: session.notes || "",
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  const save = async () => {
    setSaving(true); setError(null);
    try {
      const tempDate = new Date(`${form.date}T${form.hour}:00`);
      const offsetMin = tempDate.getTimezoneOffset();
      const offsetSign = offsetMin <= 0 ? "+" : "-";
      const offsetAbs = Math.abs(offsetMin);
      const offsetH = String(Math.floor(offsetAbs/60)).padStart(2,"0");
      const offsetM = String(offsetAbs%60).padStart(2,"0");
      const isoDate = `${form.date}T${form.hour}:00${offsetSign}${offsetH}:${offsetM}`;
      const duration_min = form.session_type === "cuplu" ? 100 : 50;
      await apiFetch(`/api/sessions/${session.id}`, {
        method: "PATCH",
        body: { starts_at: isoDate, duration_min, session_type: form.session_type, modality: form.modality, notes: form.notes }
      }, token);
      onSaved();
      onClose();
    } catch(err) { setError(err.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ width: 460 }} onClick={e => e.stopPropagation()}>
        <div className="modal-title">
          Editează programare
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="info-box" style={{ marginBottom: 16 }}>
          {session.patient?.last_name} {session.patient?.first_name}
        </div>
        {error && <div style={{ background:"#FEE2E2", border:"1px solid #FCA5A5", borderRadius:6, padding:"10px 14px", marginBottom:14, fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"var(--danger)" }}>{error}</div>}
        <div style={{ display:"grid", gap:14 }}>
          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:12 }}>
            <div className="form-group" style={{ margin:0 }}>
              <label className="form-label">Data</label>
              <input className="form-input" type="date" value={form.date}
                onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
            </div>
            <div className="form-group" style={{ margin:0 }}>
              <label className="form-label">Ora</label>
              <select className="form-input" value={form.hour} onChange={e => setForm(f => ({ ...f, hour: e.target.value }))}>
                {["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(h =>
                  <option key={h} value={h}>{h}</option>
                )}
              </select>
            </div>
          </div>
          <div className="form-group" style={{ margin:0 }}>
            <label className="form-label">Tip ședință</label>
            <select className="form-input" value={form.session_type} onChange={e => setForm(f => ({ ...f, session_type: e.target.value }))}>
              <option value="individual">Individual</option>
              <option value="cuplu">Cuplu</option>
              <option value="minor">Minor</option>
            </select>
          </div>
          <div className="form-group" style={{ margin:0 }}>
            <label className="form-label">Modalitate</label>

const NewSessionModal = ({ token, onClose, onSaved, defaultDate }) => {
  const [patients, setPatients] = useState([]);
  const [form, setForm] = useState({
    patient_id: "",
    starts_at: defaultDate || "",
    duration_min: 50,
    session_type: "individual",
    modality: "in_person",
    notes: "",
  });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    apiFetch("/api/patients?limit=100", {}, token)
      .then(d => setPatients(d.data || [])).catch(console.error);
  }, [token]);

  const save = async () => {
    if (!form.patient_id) { setError("Selectează un client."); return; }
    if (!form.date || !form.hour) { setError("Selectează data și ora."); return; }
    setSaving(true); setError(null);
    try {
      if (!form.date || !form.hour) { setError("Selectează data și ora."); setSaving(false); return; }
      // Construim ISO string cu offset Romania (+03:00 vara, +02:00 iarna)
      // Detectăm offset-ul curent al browserului
      const tempDate = new Date(`${form.date}T${form.hour}:00`);
      const offsetMin = tempDate.getTimezoneOffset(); // negativ pentru EST+
      const offsetSign = offsetMin <= 0 ? "+" : "-";
      const offsetAbs = Math.abs(offsetMin);
      const offsetH = String(Math.floor(offsetAbs/60)).padStart(2,"0");
      const offsetM = String(offsetAbs%60).padStart(2,"0");
      const isoDate = `${form.date}T${form.hour}:00${offsetSign}${offsetH}:${offsetM}`;
      await apiFetch("/api/sessions", {
        method: "POST",
        body: {
          patient_id: form.patient_id,
          starts_at: isoDate,
          duration_min: Number(form.duration_min),
          session_type: form.session_type,
          modality: form.modality,
          notes: form.notes,
        }
      }, token);
      onSaved();
      onClose();
    } catch (err) { setError(err.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ width: 480 }} onClick={e => e.stopPropagation()}>
        <div className="modal-title">
          Programare nouă
          <button className="modal-close" onClick={onClose}>×</button>

        {error && <div style={{ background:"#FEE2E2", border:"1px solid #FCA5A5", borderRadius:6, padding:"10px 14px", marginBottom:14, fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"var(--danger)" }}>{error}</div>}

        <div style={{ display:"grid", gap:14 }}>
          <div className="form-group" style={{ margin:0 }}>
            <label className="form-label">Client *</label>
            <select className="form-input" value={form.patient_id} onChange={e => setForm(f => ({ ...f, patient_id: e.target.value }))}>
              <option value="">— Selectează client —</option>
              {patients.map(p => <option key={p.id} value={p.id}>{p.last_name} {p.first_name}</option>)}
            </select>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:12 }}>
            <div className="form-group" style={{ margin:0 }}>
              <label className="form-label">Data *</label>
              <input className="form-input" type="date"
                value={form.date || ""}
                onChange={e => setForm(f => ({ ...f, date: e.target.value }))} />
            </div>
            <div className="form-group" style={{ margin:0 }}>
              <label className="form-label">Ora *</label>
              <select className="form-input" value={form.hour || ""} onChange={e => setForm(f => ({ ...f, hour: e.target.value }))}>
                <option value="">--</option>
                {["08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00"].map(h =>
                  <option key={h} value={h}>{h}</option>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>

              <label className="form-label">Tip ședință</label>
              <select className="form-input" value={form.session_type} onChange={e => {
                const type = e.target.value;
                setForm(f => ({ ...f, session_type: type, duration_min: type === "cuplu" ? 100 : 50 }));
              }}>
                <option value="individual">Individual</option>
                <option value="cuplu">Cuplu</option>
                <option value="minor">Minor</option>
              </select>
            </div>

          </div>

          <div className="form-group" style={{ margin:0 }}>

              <option value="in_person">Față în față</option>
              <option value="online">Online</option>
            </select>
          </div>

          <div className="form-group" style={{ margin:0 }}>

// ── Calendar ───────────────────────────────────────────────
const Calendar = ({ token, onNavigate }) => {
  const [weekData, setWeekData] = useState(null);
  const [selected, setSelected] = useState(null);
  const [weekOffset, setWeekOffset] = useState(0);
  const [showNew, setShowNew] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [editSession, setEditSession] = useState(null);

  const getMonday = (offset) => {
    const now = new Date();
    const day = now.getDay();
    const diffToMonday = day === 0 ? -6 : -(day - 1);
    const monday = new Date(now);
    monday.setDate(now.getDate() + diffToMonday + offset * 7);
    monday.setHours(12, 0, 0, 0);
    return monday;
  };

  useEffect(() => {
    const monday = getMonday(weekOffset);
    apiFetch(`/api/sessions/week?date=${monday.toISOString()}`, {}, token)
      .then(setWeekData).catch(console.error);
  }, [token, weekOffset]);

  const loadWeek = () => {
    const monday = getMonday(weekOffset);
    apiFetch(`/api/sessions/week?date=${monday.toISOString()}`, {}, token)
      .then(setWeekData).catch(console.error);
  };

  const getAptForDayHour = (dayIdx, hour) => {
    if (!weekData?.sessions) return null;
    const targetDate = weekDates[dayIdx];
    if (!targetDate) return null;
    return weekData.sessions.find(s => {
      const d = new Date(s.starts_at);
      // Compară ziua calendaristică (local)
      const sameDay = d.getDate() === targetDate.getDate() &&
                      d.getMonth() === targetDate.getMonth() &&
                      d.getFullYear() === targetDate.getFullYear();
      // Compară ora locală
      const localH = String(d.getHours()).padStart(2,"0") + ":00";
      return sameDay && localH === hour;
    });
  };

  // Generează datele săptămânii din weekOffset direct (nu depinde de API)
  const weekDates = Array.from({length: 5}, (_, i) => {
    const monday = getMonday(weekOffset);
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });

  const cancelSession = async (id) => {
    if (!confirm("Anulezi această programare?")) return;
    try {
      await apiFetch(`/api/sessions/${id}`, { method: "DELETE" }, token);
      setSelected(null);
      loadWeek();
    } catch(err) { alert(err.message); }
  };

  return (
    <div>
      <div className="row-between" style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 18, fontWeight: 600, color: "var(--navy)" }}>
          {`${weekDates[0].toLocaleDateString("ro", { day:"numeric", month:"long" })} – ${weekDates[4].toLocaleDateString("ro", { day:"numeric", month:"long", year:"numeric" })}`}
        </div>
        <div className="row">
          <button className="btn btn-outline btn-sm" onClick={() => setWeekOffset(w => w - 1)}>‹ Prev</button>
          <button className="btn btn-outline btn-sm" onClick={() => setWeekOffset(0)}>Azi</button>
          <button className="btn btn-outline btn-sm" onClick={() => setWeekOffset(w => w + 1)}>Next ›</button>
          <button className="btn btn-gold btn-sm" onClick={() => setShowNew(true)}>+ Programare</button>
        </div>
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div className="cal-grid" style={{ borderBottom: "1px solid var(--border)" }}>
          <div className="cal-header" />
          {DAYS.map((d, i) => (
            <div className="cal-header" key={i} style={{ borderLeft: "1px solid var(--border)" }}>
              {d}<br/>
              <span style={{ fontSize: 18, fontWeight: 400, fontFamily: "'Cormorant Garamond',serif" }}>
                {weekDates[i]?.getDate() || ""}
              </span>
            </div>
          ))}
        </div>
        <div style={{ maxHeight: 480, overflowY: "auto" }}>
          {HOURS.map((hour, hi) => (
            <div className="cal-grid" key={hi}>
              <div className="cal-time">{hour}</div>
              {DAYS.map((_, di) => {
                const apt = getAptForDayHour(di, hour);
                const aptClass = apt ? `cal-apt cal-apt-${apt.session_type || "individual"}` : "";
                return (
                  <div className="cal-cell" key={di} onClick={() => apt && setSelected(apt)}>
                    {apt && (
                      <div className={aptClass}>
                        {apt.patient?.last_name}<br/>
                        <span style={{ fontWeight: 400, fontSize: 10 }}>{apt.duration_min} min</span>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {showEdit && selected && (
        <EditSessionModal
          token={token}
          session={selected}
          onClose={() => setShowEdit(false)}
          onSaved={() => { setShowEdit(false); setSelected(null); loadWeek(); }}
        />
      )}

      {showNew && (
        <NewSessionModal
          token={token}
          onClose={() => setShowNew(false)}
          onSaved={() => { loadWeek(); setShowNew(false); }}
        />
      )}

      {selected && (
        <div className="modal-overlay" onClick={() => setSelected(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">
              {selected.patient?.last_name} {selected.patient?.first_name}
              <button className="modal-close" onClick={() => setSelected(null)}>×</button>
            </div>
            <div className="info-box" style={{ marginBottom: 16 }}>
              {new Date(selected.starts_at).toLocaleString("ro", { weekday:"long", day:"numeric", month:"long", hour:"2-digit", minute:"2-digit" })}
              {" · "}{selected.duration_min} min
            </div>
            <div className="row">
              <Tag type={selected.status} />
              <Tag type={selected.session_type || "individual"} />
            </div>
            <div className="divider" />
            <div className="row">
              <button className="btn btn-primary btn-sm"
                onClick={() => { setSelected(null); onNavigate && onNavigate("documents"); }}>
                Notă de ședință
              </button>
              <button className="btn btn-outline btn-sm"
                onClick={() => {
                  const s = selected;
                  setSelected(null);
                  setEditSession(s);
                  setShowEdit(true);
                }}>
                Editează
              </button>
              <button className="btn btn-sm" style={{ color: "var(--danger)", border: "1px solid var(--danger)" }}
                onClick={() => cancelSession(selected.id)}>
                Anulează
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

              {patients.map(p => <option key={p.id} value={p.id}>{p.last_name} {p.first_name}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="grid-4" style={{ marginBottom: 24 }}>
        {DOC_TYPES.map(doc => {
          const isDone = !!generated[doc.id];
          return (
            <div className="card" key={doc.id} style={{ padding: 18, borderTop: `3px solid ${isDone ? "var(--success)" : "var(--border)"}` }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>{doc.icon}</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "var(--navy)", marginBottom: 12 }}>{doc.label}</div>
              {isDone ? (
                <div className="row">
                  <a href={generated[doc.id].docx_url} target="_blank" className="btn btn-outline btn-sm">↓ DOCX</a>
                </div>
              ) : (
                <button className="btn btn-primary btn-sm"
                  onClick={() => { if (!selPatient) { alert("Selectează un client."); return; } setActiveDoc(doc); }}
                  disabled={!selPatient}>
                  Completează
                </button>
              )}
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">Documente recente</div>
        {docs.length === 0
          ? <div className="info-box">Nu există documente generate.</div>
          : docs.map((d, i) => (
            <div className="list-row" key={i}>
              <span style={{ fontSize: 18 }}>📄</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 500 }}>{d.title}</div>
                <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "var(--muted)" }}>
                  {d.patient?.last_name} {d.patient?.first_name} · {new Date(d.created_at).toLocaleDateString("ro")}
                </div>
              </div>
              <Tag type={d.status} />
              {d.docx_url && <a href={d.docx_url} target="_blank" className="btn btn-outline btn-sm">↓ DOCX</a>}
            </div>
          ))
        }
      </div>

      {activeDoc && selectedPatient && (
        <DocForm
          doc={activeDoc}
          patient={selectedPatient}
          token={token}
          onDone={handleDone}
          onClose={() => setActiveDoc(null)}
        />
      )}
    </div>
  );
};

// ── Settings ───────────────────────────────────────────────
const Settings = ({ token, cabinetInfo, onLogout }) => (
  <div style={{ maxWidth: 560 }}>
    <div className="card" style={{ marginBottom: 18 }}>
      <div className="card-title">Date cabinet</div>
      {cabinetInfo && [
        ["Psiholog", cabinetInfo.profile?.full_name],
        ["Cod CPR", cabinetInfo.profile?.cod_cpr],
        ["Cabinet", cabinetInfo.name],
        ["Email", cabinetInfo.email],
        ["Telefon", cabinetInfo.phone],
        ["Website", cabinetInfo.website],
        ["Oraș", cabinetInfo.city],
      ].map(([k, v]) => (
        <div className="list-row" key={k}>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "var(--muted)", width: 100, flexShrink: 0 }}>{k}</div>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13 }}>{v || "—"}</div>
        </div>
      ))}
      <div className="divider" />
      <div className="info-box">Editarea datelor cabinetului — în curând.</div>
    </div>
    <div className="card">
      <div className="card-title">Cont</div>
      <button className="btn btn-outline" onClick={onLogout} style={{ color: "var(--danger)", borderColor: "var(--danger)" }}>
        Deconectare
      </button>
    </div>
  </div>
);

// ── App principal ──────────────────────────────────────────
const VIEWS = [
  { id: "dashboard", label: "Dashboard", icon: "▦" },
  { id: "calendar", label: "Calendar", icon: "◫" },
  { id: "patients", label: "Clienți", icon: "◻" },
  { id: "documents", label: "Documente", icon: "▤" },
  { id: "settings", label: "Setări", icon: "◈" },
];

const App = () => {
  const [session, setSession] = useState(null);
  const [view, setView] = useState("dashboard");
  const [prevView, setPrevView] = useState(null);
  const [cabinetInfo, setCabinetInfo] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
      setSession(session);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session?.access_token) return;
    apiFetch("/api/cabinet", {}, session.access_token)
      .then(setCabinetInfo).catch(console.error);
  }, [session]);

  const handleLogout = async () => {
    await sb.auth.signOut();
    setSession(null);
    setCabinetInfo(null);
  };

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:"var(--navy)" }}>
      <div style={{ color:"var(--gold)", fontSize:24, fontWeight:600 }}>cabinet.app</div>
    </div>
  );

  if (!session) return <Login onLogin={setSession} />;

  const token = session.access_token;

  const renderView = () => {
    switch(view) {
      case "dashboard": return <Dashboard token={token} cabinetInfo={cabinetInfo} />;
      case "calendar": return <Calendar token={token} onNavigate={(v) => { setPrevView(view); setView(v); }} />;
      case "patients": return <Patients token={token} />;
      case "documents": return <Documents token={token} />;
      case "settings": return <Settings token={token} cabinetInfo={cabinetInfo} onLogout={handleLogout} />;
      default: return null;
    }
  };

  const pageTitle = VIEWS.find(v => v.id === view)?.label || "";

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-gem" />
            <div>
              <div className="logo-text">cabinet.app</div>
              <div className="logo-sub">Psihologie clinică</div>
            </div>
          </div>
        </div>
        <nav>
          <div className="nav-section">Aplicație</div>
          {VIEWS.filter(v => v.id !== "settings").map(v => (
            <div key={v.id} className={`nav-item ${view === v.id ? "active" : ""}`} onClick={() => setView(v.id)}>
              <span className="nav-icon">{v.icon}</span> {v.label}
            </div>
          ))}
          <div className="nav-section">Cont</div>
          <div className={`nav-item ${view === "settings" ? "active" : ""}`} onClick={() => setView("settings")}>
            <span className="nav-icon">◈</span> Setări
          </div>
        </nav>
        <div className="sidebar-user">
          <div className="user-name">{cabinetInfo?.profile?.full_name || session.user.email}</div>
          <div className="user-role">Cod CPR {cabinetInfo?.profile?.cod_cpr || "—"}</div>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <h1 className="page-title">{pageTitle}</h1>
          <div className="topbar-right">
            {prevView && prevView !== view && (
              <button className="btn btn-outline btn-sm" onClick={() => { setView(prevView); setPrevView(null); }}>
                ← Înapoi
              </button>
            )}
            <span className="pill">cabinet.app · beta</span>
          </div>
        </div>
        <div className="content">
          {renderView()}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
